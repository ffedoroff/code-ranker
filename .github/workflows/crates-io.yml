name: Publish to crates.io
# Manual release step — run via the single "Release (publish everywhere)" button
# (publish.yml) after Verify is green, or on its own. Never auto-publishes on tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version being released (informational; cargo reads Cargo.toml)'
        required: false
        type: string

# Read-only GITHUB_TOKEN; publishing authenticates with CARGO_REGISTRY_TOKEN.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        run: |
          if ! command -v rustup > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
      - name: Publish crates (bottom-up, retrying on rate-limit)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # crates.io renders a per-crate README. We keep a single source of
          # truth (the repo-root README.md) and drop a copy into each crate dir
          # right before publishing; cargo auto-detects a package-root README.md
          # when no `readme` field is set. `--allow-dirty` tolerates the copy.
          for d in crates/*/; do cp README.md "$d/README.md"; done
          # Same trick for the `--doc` corpus: the plugins/ tree lives at the
          # repo root (outside the crate, so not in the published tarball by
          # default). Copy it into the CLI crate so `cargo publish` packs it and
          # `cargo install code-ranker` embeds the full corpus; build.rs prefers
          # this package-local copy over the repo-root tree. `--allow-dirty` covers it.
          cp -R plugins crates/code-ranker-cli/plugins
          for c in code-ranker-plugin-api code-ranker-graph code-ranker-plugins code-ranker-viewer code-ranker; do
            echo "==> publishing $c"
            attempt=0
            until cargo publish -p "$c" --allow-dirty 2>&1 | tee /tmp/pub-$c.log | grep -qE "Published"; do
              if grep -qE "already (exists|uploaded)" /tmp/pub-$c.log; then
                echo "    skip: $c version already on crates.io"
                break
              fi
              if grep -q "Too Many Requests" /tmp/pub-$c.log; then
                echo "    rate-limited; sleeping 120s"
                sleep 120
                attempt=$((attempt+1))
                if [ "$attempt" -ge 15 ]; then
                  echo "    giving up after $attempt attempts"
                  cat /tmp/pub-$c.log | tail -20
                  exit 1
                fi
                continue
              fi
              echo "    unexpected error:"
              cat /tmp/pub-$c.log | tail -20
              exit 1
            done
          done
