name: Release (publish — pick registries)

# The single manual "Release" button, with a checkbox per registry. Tick only the
# registries you want, and only those are published. Everything defaults to OFF so
# an experiment never pushes a version somewhere it isn't needed.
#
# Safety gate: this workflow checks ONCE that 'Verify (no publish)' is green for the
# exact commit the tag points at (the tag push triggers Verify automatically). If it
# isn't green the release stops — unless you tick `force`, which deploys anyway.
# (Dispatching the per-registry workflows directly is intentionally NOT gated.)
#
# Flow: bump version -> commit -> push main -> push tag v<version> (runs Verify)
# -> once Verify is green, run THIS workflow, ticking the registries to publish.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the v prefix (e.g. 1.0.0-alpha.3). Tag v<version> must exist and Verify must be green.'
        required: true
        type: string
      crates:
        description: 'Publish to crates.io'
        type: boolean
        default: false
      pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: false
      docker:
        description: 'Publish Docker image (Docker Hub + GHCR)'
        type: boolean
        default: false
      github_release:
        description: 'GitHub Release + prebuilt binaries + npm (cargo-dist)'
        type: boolean
        default: false
      force:
        description: 'Deploy even if Verify is not green for this tag (override the safety gate)'
        type: boolean
        default: false

permissions:
  actions: write     # required to dispatch the per-registry workflows
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      V: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure the tag exists
        run: |
          git fetch --tags --quiet
          if ! git rev-parse "v$V" >/dev/null 2>&1; then
            echo "tag v$V does not exist — push it first (that runs Verify), then release"; exit 1
          fi
          echo "tag v$V exists"
      - name: Verify must be green for this tag (unless forced)
        # Checked once, here, only for the real "Release" entry point. If Verify
        # isn't green for the tag's commit the release stops — re-run with
        # force=true to override. Running a per-registry workflow directly is
        # not gated by design.
        run: |
          SHA="$(git rev-parse "v$V^{commit}")"
          echo "tag v$V → commit $SHA"
          green="$(gh run list --workflow verify.yml --limit 100 \
                     --json headSha,status,conclusion \
                     --jq "[.[] | select(.headSha==\"$SHA\" and .status==\"completed\" and .conclusion==\"success\")] | length")"
          if [ "${green:-0}" -ge 1 ]; then
            echo "Verify is green for $SHA ✅ — proceeding."
          elif [ "${{ inputs.force }}" = "true" ]; then
            echo "::warning::No green Verify run for $SHA, but force=true — deploying anyway."
          else
            echo "::error::No green 'Verify (no publish)' run for commit $SHA (tag v$V)."
            echo "Wait for Verify to pass (gh run list --workflow verify.yml --limit 5),"
            echo "or re-run this with force=true to override the gate."
            exit 1
          fi
      - name: Dispatch selected registries
        run: |
          set -e
          picked=0
          release_rid=""

          # Independent registries build from source (no cross-dep) → run in
          # parallel. The GitHub Release also builds the binary tarballs the Docker
          # image downloads, so capture its run id to order Docker after it.
          if [ "${{ inputs.github_release }}" = "true" ]; then
            echo "==> GitHub Release + binaries + npm (cargo-dist)"
            gh workflow run release.yml   --ref main -f tag="v$V"; picked=1
            sleep 8   # let the dispatched run register before we look it up
            release_rid="$(gh run list --workflow release.yml --event workflow_dispatch \
                             --limit 1 --json databaseId --jq '.[0].databaseId')"
            echo "Release run id: ${release_rid:-<none>}"
          fi
          if [ "${{ inputs.crates }}" = "true" ]; then
            echo "==> crates.io"
            gh workflow run crates-io.yml --ref main -f version="$V"; picked=1
          fi
          if [ "${{ inputs.pypi }}" = "true" ]; then
            echo "==> PyPI"
            gh workflow run pypi.yml      --ref main -f version="$V"; picked=1
          fi

          # Docker depends on the GitHub Release (the Dockerfile downloads its
          # binary tarballs). If the Release was dispatched this run, wait for it to
          # finish before dispatching Docker; a failed Release short-circuits Docker
          # (set -e + --exit-status). Docker-only runs assume an existing release.
          if [ "${{ inputs.docker }}" = "true" ]; then
            picked=1
            if [ -n "$release_rid" ]; then
              echo "Docker waits for Release run $release_rid (it downloads the release binaries)…"
              gh run watch "$release_rid" --exit-status --interval 20
              echo "Release finished ✅ — dispatching Docker."
            fi
            echo "==> Docker (Docker Hub + GHCR)"
            gh workflow run docker.yml    --ref main -f version="$V"
          fi

          if [ "$picked" = "0" ]; then
            echo "no registry selected — tick at least one checkbox"; exit 1
          fi
          echo "dispatched the selected registries for v$V."
