# Worked example for docs/customization/README.md — a TLOC/SLOC ratio metric, an
# aggregate over only the large files (loc > 300), a `check` threshold on the
# custom metric, and a project-defined Prompt-Generator preset. Run from the repo
# root (artifacts land in the git-ignored .code-ranker/ by default):
#
#   code-ranker report . --config docs/customization/custom-field-example.toml --output.json --output.html
#   code-ranker check  . --config docs/customization/custom-field-example.toml
#   code-ranker report . --config docs/customization/custom-field-example.toml \
#     --output.scorecard --metric tsr --severity warning --top 1

# Per-file test-to-source ratio (guarded against divide-by-zero). Every spec field
# below is optional, but they drive the UI: `name` is the tooltip title, `short`
# the table header, `description` the tooltip body, `formula_pretty` the readable
# formula shown in the tooltip — and right below it the SAME formula filled with
# this file's numbers (e.g. `81 / 105 = 0.771`), exactly like the built-in `hk`.
# That live line is driven by `calc`; when omitted it defaults to the CEL `formula`
# (valid JS here), so a plain-arithmetic metric needs nothing extra. Set `calc`
# explicitly only if the formula uses CEL-only functions (log2/pow/…).
[metrics.tsr]
formula        = "sloc > 0.0 ? tloc / sloc : 0.0"
formula_pretty = "tloc / sloc"
label          = "TLOC/SLOC"
name           = "Test-to-source ratio"
short          = "TS"
description    = "Test lines (tloc) per source line (sloc). High values flag files whose inline tests outweigh their production code — candidates for splitting tests out into their own module."
direction      = "lower_better"
group          = "loc"
# Two-tier severity thresholds — what the scorecard and viewer badge against
# (distinct from the single-tier `[rules.thresholds.file]` check gate below).
warning        = 1.5
info           = 0.8

# The same ratio but only on large files — zero elsewhere, so the `not_empty`
# aggregate population drops the small files automatically (the "where loc > 300"
# filter, expressed with primitives that exist today).
[metrics.tsr_big]
formula        = "loc > 300.0 ? (sloc > 0.0 ? tloc / sloc : 0.0) : 0.0"
formula_pretty = "loc > 300 ? tloc / sloc : 0"
label          = "TLOC/SLOC (loc>300)"
name           = "Test-to-source ratio (large files)"
short          = "TSbig"
description    = "Test-to-source ratio, but only on files over 300 lines; zero elsewhere so an aggregate over the `not_empty` population sees just the large files."
direction      = "lower_better"
group          = "loc"

# Aggregate: the worst ratio among the TOP 10 large files (highest ratio among the
# loc>300 files). `top10_max` = keep the 10 largest values, then take their max.
[metrics.tsr_big_avg]
scope          = "graph"
formula        = "agg('tsr_big', 'top10_max', 'not_empty')"
formula_pretty = "max( top10( tsr_big where loc > 300 ) )"
label          = "TLOC/SLOC avg (top 10, loc>300)"
name           = "Test-to-source — worst of the 10 largest files"
description    = "A single-number health signal: the worst test-to-source ratio among the ten largest files (loc > 300)."

# Gate `check` on the custom metric: any file whose test-to-source ratio exceeds
# 1.5 is a violation. A custom [metrics.<key>] is thresholdable exactly like a
# built-in (sloc / hk / cyclomatic / …).
[rules.thresholds.file]
tsr = 1.5

# Surface the custom metrics in the HTML table / card (project-level [report]
# override, applied over the language's). `after` puts the columns right after
# `hk` instead of at the end; without [report] they'd only show in the node popup.
[report]
columns = { after = { hk = ["tsr", "tsr_big"] } }
card    = { add = ["tsr"] }
stats   = { add = ["tsr_big_avg"] }
# SVG map: offer `tsr` as a circle-size mode (node area ∝ ratio) alongside the
# built-in sloc/hk, and `tsr_big` as a node filter (show only the loc>300 files
# that feed the aggregate) alongside the built-in cycle filter.
size    = { add = ["tsr"] }
filter  = { add = ["tsr_big"] }

# A project-defined Prompt-Generator preset (a refactoring lens over the custom
# metric). Makes `--metric tsr` / the scorecard rank files by `tsr`. The id is the
# table key; `label` / `title` default to it.
[presets.TSR]
title       = "TSR — Trim inline test bulk"
sort_metric = "tsr"
prompt      = """
These files carry more test lines than source lines. Move their inline `#[cfg(test)]`
modules into sibling `tests/` files (or `#[path]`-included test modules), keeping the
test coverage identical, so the production code reads on its own.
"""
