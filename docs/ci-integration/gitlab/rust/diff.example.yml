# ---------------------------------------------------------------------------
# code-ranker — DIFF mode (great for merge requests)
#
# On an MR, this pulls the code-ranker JSON from the latest SUCCESSFUL pipeline
# on the TARGET branch and renders the HTML as a baseline<->current diff with a
# verdict (improved / degraded / neutral). On the default branch (no target),
# or when no baseline exists yet, it gracefully produces a plain review report.
#
# It then `check`s the snapshot — gating on violations NEW vs the target branch
# (relative) and emitting a GitLab Code Quality report shown inline on the MR.
# The job is a SOFT gate (`allow_failure: true`): a new violation marks it failed
# but does not block the pipeline (drop allow_failure for a hard gate). The
# baseline fetch is strictly best-effort: a missing baseline, a 404, or any parse
# miss only downgrades to a review report + an absolute check — it NEVER errors.
#
# Prerequisites:
#   1. `code-ranker` on PATH (see minimal.example.yml).
#   2. A read_api token in the CODERANKER_API_TOKEN CI/CD variable
#      (Masked, NOT Protected). See README.md for why and how.
#      Without it, the job still runs but only ever emits a review report.
# ---------------------------------------------------------------------------

code-ranker:
  # Rust note: the analysis runs `cargo metadata` under the hood — run this job
  # on the same base Rust image / cargo cache as your build/test jobs so deps
  # are already on disk. See README.md → "Rust: the cargo dependency cache".
  image: your-registry/your-rust-image:latest

  stage: test
  interruptible: true
  # Soft gate: step 4's `check` exits non-zero on a NEW violation, but
  # allow_failure keeps it advisory. Remove this line for a hard gate that blocks.
  allow_failure: true

  script:
    - H="$(git rev-parse --short=12 HEAD)"
    # 1) Analyze the workspace -> JSON snapshot (named by commit hash).
    #    Inject clean git metadata mapped from CI variables: a detached CI checkout
    #    otherwise reports the branch as "HEAD" and counts the files this job writes
    #    as "dirty". With branch+commit+dirty-files all set, code-ranker skips git
    #    entirely. The snapshot carries this block, so step 3's render reuses it.
    #    See docs/code-ranker-cli/CLI.md → "Git metadata overrides".
    - BR="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-$CI_COMMIT_REF_NAME}"
    - |
      code-ranker report . \
        --git.branch="$BR" \
        --git.commit="$CI_COMMIT_SHA" \
        --git.dirty-files=0 \
        --git.origin="$CI_PROJECT_URL" \
        --output.json.path="code-ranker-${H}.json"

    # 2) Fetch the baseline from the target branch (best-effort).
    - |
      # The pipelines API is used (not jobs/artifacts/:ref/download) because it
      # sees detached MR pipelines (ref=refs/merge-requests/N/head) and only needs
      # the code-ranker JOB to be green. CI_JOB_TOKEN can't reach this API, so a
      # read_api token (CODERANKER_API_TOKEN) is used when set; otherwise — or on
      # any error — this falls through to a review report and never fails the job.
      TARGET="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      BASE_JSON=""
      api="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"
      if [ -n "${CODERANKER_API_TOKEN:-}" ]; then auth="PRIVATE-TOKEN: ${CODERANKER_API_TOKEN}"; else auth="JOB-TOKEN: ${CI_JOB_TOKEN}"; fi
      PID=$(curl -sSL --header "$auth" "${api}/pipelines?ref=${TARGET}&status=success&per_page=1" | tr ',' '\n' | grep -o '"id":[0-9]*' | head -n1 | grep -o '[0-9]*' || true)
      if [ -n "$PID" ] && command -v unzip >/dev/null 2>&1; then
        JID=$(curl -sSL --header "$auth" "${api}/pipelines/${PID}/jobs?per_page=100" | tr '{' '\n' | grep '"name":"code-ranker"' | grep -o '"id":[0-9]*' | head -n1 | grep -o '[0-9]*' || true)
        if [ -n "$JID" ] && curl -fsSL --header "$auth" "${api}/jobs/${JID}/artifacts" -o base.zip 2>/dev/null && unzip -qo base.zip -d base 2>/dev/null; then
          BASE_JSON="$(ls base/code-ranker-*.json 2>/dev/null | head -n1)"
        fi
      fi

    # 3) Render HTML: a diff if we have a baseline, otherwise a review report.
    - |
      if [ -n "$BASE_JSON" ]; then
        echo "baseline from ${TARGET}: ${BASE_JSON}"
        code-ranker report "code-ranker-${H}.json" --baseline "$BASE_JSON" --output.html.path="code-ranker-${H}.html"
      else
        echo "no baseline on ${TARGET} yet -> review report"
        code-ranker report "code-ranker-${H}.json" --output.html.path="code-ranker-${H}.html"
      fi

    # 4) Gate + native findings. `check` the snapshot (no re-analysis) and write a
    #    GitLab Code Quality report — rendered inline on the MR diff. With a
    #    baseline the gate is RELATIVE: only violations NEW vs the target branch
    #    count, so pre-existing debt never fails the MR (and the report lists just
    #    the new ones). `check` exits non-zero on a new violation — the gate;
    #    `artifacts: when: always` still uploads the report so it's highlighted even
    #    when the gate fails. Keep this LAST — a non-zero exit ends the script.
    - |
      if [ -n "$BASE_JSON" ]; then
        code-ranker check "code-ranker-${H}.json" --baseline "$BASE_JSON" --output-format codequality > gl-code-quality-report.json
      else
        code-ranker check "code-ranker-${H}.json" --output-format codequality > gl-code-quality-report.json
      fi

  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - "code-ranker-*.json"
      - "code-ranker-*.html"
      - "gl-code-quality-report.json"
    # GitLab renders the Code Quality report `check` wrote inline on the MR diff +
    # the pipeline widget (GA; no feature flag). Fixed path — `reports:` resolves
    # at config-parse time, before the script runs.
    reports:
      codequality: gl-code-quality-report.json

  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE =~ /^(merge_request_event|web|api|schedule)$/'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
