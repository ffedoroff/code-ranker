# ---------------------------------------------------------------------------
# code-split — MINIMAL mode (advisory linter + artifacts)
#
# Runs code-split on every MR and on the default branch, produces a JSON
# snapshot and a self-contained HTML viewer, and keeps both as artifacts.
# It does NOT compare against anything — no baseline, no token, no API calls.
#
# Prerequisite: `code-split` must be on PATH. Either bake it into your CI image
# (`cargo install code-split`, or copy a prebuilt binary), or install it in a
# `before_script`.
# ---------------------------------------------------------------------------

code-split:
  # Use an image that already has the code-split binary. If it doesn't, add:
  #   before_script:
  #     - cargo install code-split --locked
  #
  # Rust note: the analysis runs `cargo metadata` under the hood, which resolves
  # the full dependency graph. Run this job on the SAME base Rust image (and
  # cargo cache) as your build/test jobs so deps are already on disk — otherwise
  # a cold runner spends minutes fetching crates before the analysis can start.
  # See README.md → "Rust: the cargo dependency cache". (Rust-only; Python/JS
  # need none of this.)
  image: your-registry/your-rust-image:latest

  stage: test
  interruptible: true
  allow_failure: true        # advisory — a failed analysis never blocks the pipeline

  script:
    # Name artifacts by commit hash so each run is identifiable and never collides.
    - H="$(git rev-parse --short=12 HEAD)"
    # Inject clean git metadata into the snapshot. CI mangles the raw git view —
    # a detached checkout reports the branch as "HEAD", and files the job writes
    # before analysis would inflate the dirty count — so map CI variables onto the
    # --git.* flags. With branch+commit+dirty-files all set, code-split never even
    # shells out to git. See docs/CLI.md → "Git metadata overrides".
    - BR="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-$CI_COMMIT_REF_NAME}"
    - |
      code-split report . \
        --git.branch="$BR" \
        --git.commit="$CI_COMMIT_SHA" \
        --git.dirty-files=0 \
        --git.origin="$CI_PROJECT_URL" \
        --output.json.path="code-split-${H}.json" \
        --output.html.path="code-split-${H}.html"

  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - "code-split-*.json"
      - "code-split-*.html"

  rules:
    # Skip tag pipelines; run on MRs and on the default branch.
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE =~ /^(merge_request_event|web|api|schedule)$/'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

# ---------------------------------------------------------------------------
# Optional: a strict gate instead of (or alongside) the advisory report.
# `check` evaluates thresholds / cycle rules and EXITS NON-ZERO on violation,
# so drop `allow_failure` to actually block the pipeline. It writes no files.
#
# code-split-gate:
#   image: your-registry/your-rust-image:latest
#   stage: test
#   script:
#     - code-split check .          # add threshold/cycle flags as needed
# ---------------------------------------------------------------------------
