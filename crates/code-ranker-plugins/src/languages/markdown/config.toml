# Markdown language config — inherits `../defaults.toml` (see `../config.rs`).
#
# Markdown is documentation, not code: it has no Halstead / cyclomatic / cognitive
# metrics, so it does NOT run the tree-sitter complexity engine. The plugin emits
# a file node with `loc` per document and a `uses` edge for every Markdown link to
# another local `.md` file — so the orchestrator still derives coupling
# (fan_in / fan_out / hk) and cycles over the doc link graph.

doc_lang = "markdown"

extensions = ["md", "markdown"]
skip_dirs = ["node_modules", "target", "vendor"]

# Multi-char Markdown syntax markers the line scanner keys on — DATA (the scan
# LOGIC stays in `structure.rs`; single-char tokens like `#`/`)` stay inline as
# pure syntax). `fences` toggle fenced code blocks; `link_open` opens an inline
# link destination; `url_scheme`/`mailto_prefix` mark a link as external.
[markers]
fences = ["```", "~~~"]
link_open = "]("
url_scheme = "://"
mailto_prefix = "mailto:"

# ── Markdown-specific node attributes (measured by `structure.rs`, no engine) ──
# Each is a plain integer counter set per document. They render like any metric
# (popup + table via the [report] override below) and are thresholdable in
# `check` (e.g. gate on `broken_links`).
[node_attributes.headings]
value_type = "int"
label = "Headings"
short = "H"
description = "Number of ATX headings (`#` … `######`) — the document's section count."
remediation = "Split the document into focused pages, or group sections under fewer top-level headings."

[node_attributes.max_depth]
value_type = "int"
label = "Max heading depth"
short = "H-depth"
description = "Deepest heading level used (1 = only `#`, 6 = down to `######`). A proxy for how deeply the document is nested."
remediation = "Flatten the section hierarchy — promote deeply nested headings, or split them into separate documents."
direction = "lower_better"

[node_attributes.code_lines]
value_type = "int"
label = "Code lines"
short = "Code"
description = "Lines inside fenced code blocks (```), i.e. how much embedded code the document carries."
remediation = "Move long embedded code into referenced example files, or trim snippets to the essential lines."

[node_attributes.links]
value_type = "int"
label = "Links"
short = "Links"
description = "Total inline Markdown links `[text](dest)` (local files, URLs and anchors alike)."
remediation = "Group related references, or split the document so each page carries a focused set of links."

[node_attributes.broken_links]
value_type = "int"
label = "Broken links"
short = "Broken"
description = "Links to a local file (not a URL or `#anchor`) that does not exist on disk. A documentation-quality signal — gate it to zero in `check`."
remediation = "Fix or remove each dead link — correct the path, restore the target file, or drop the reference."
direction = "lower_better"

# Surface the doc metrics in the table (Markdown has none of the code columns).
[report]
columns = { add = ["headings", "max_depth", "links", "broken_links", "code_lines"] }
