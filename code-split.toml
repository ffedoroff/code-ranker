# code-split.toml — project-level configuration for code-split
#
plugin = "rust"   # default plugin; overridden by --plugin
#
# Searched automatically (highest priority first):
#   1. CLI flags (--ignore, --cycle-rule, --threshold)
#   2. --config <file>
#   3. code-split.toml  (cwd, then workspace root)
#   4. Cargo.toml    [workspace.metadata.code-split] or [package.metadata.code-split]
#   5. Built-in defaults

# ── Ignore ─────────────────────────────────────────────────────────────────────
# Nodes whose path matches any glob are removed before analysis.
# Patterns are relative to the workspace root. Supports ** globs.
[ignore]
# Strip test files from the graph (Rust `tests/`, Python `test_*.py` / `tests/`,
# JS/TS `*.test.*` / `__tests__/`, …). Accepts the legacy name `test_modules` too.
tests = true

paths = [
  # "**/tests/**",
  # "**/generated/**",
  # "crates/*/benches/**",

  # External test-only crates (dev-dependencies from registry).
  # "rstest-*/**",
  # "wiremock-*/**",
]

# ── Cycle rules ────────────────────────────────────────────────────────────────
# Each cycle kind: false = off (ignored); true = strict (any cycle fails, = 0);
# or an integer N = allow up to N cycles of that kind (the N+1-th fails — pin
# today's count to forbid adding new ones). `check` prints the current counts.
[rules.cycles]
test-embed = false   # off — language feature, not a smell
mutual     = true    # strict — two files that directly depend on each other
chain      = true    # strict — three or more files in a dependency cycle

# ── Threshold rules ────────────────────────────────────────────────────────────
# There is a single graph level — files — so the only scope is `file`:
#   [rules.thresholds.file]  — limits applied to each individual file
#
# Available metrics: hk, cyclomatic, cognitive, fan_in, fan_out, loc
# A set threshold fails `check` when exceeded; unset = not checked. HK and
# fan_in/fan_out count internal file→file coupling only (external library edges
# are excluded). Current baseline below, pasted from `check --suggest-config`.

[rules.thresholds.file]
cyclomatic  = 1
hk          = 8_624
fan_in      = 7
fan_out     = 7
loc         = 1_691
