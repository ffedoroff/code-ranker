# code-split.toml — project-level configuration for code-split
#
plugin = "rust"   # default plugin; overridden by --plugin
#
# Searched automatically (highest priority first):
#   1. CLI flags (--ignore, --cycle-rule, --threshold)
#   2. --config <file>
#   3. code-split.toml  (cwd, then workspace root)
#   4. Cargo.toml    [workspace.metadata.code-split] or [package.metadata.code-split]
#   5. Built-in defaults

# ── Ignore ─────────────────────────────────────────────────────────────────────
# Nodes whose path matches any glob are removed before analysis.
# Patterns are relative to the workspace root. Supports ** globs.
[ignore]
# Strip all inline `mod tests { … }` submodules (IDs ending with `::tests`).
test_modules = true

paths = [
  # "**/tests/**",
  # "**/generated/**",
  # "crates/*/benches/**",

  # External test-only crates (dev-dependencies from registry).
  # "axum-test-*/**",
  # "proptest-*/**",
  # "rstest-*/**",
  # "rstest_macros-*/**",
  # "wiremock-*/**",
]

# ── Cycle rules ────────────────────────────────────────────────────────────────
# Each cycle kind: false = off (ignored); true = strict (any cycle fails, = 0);
# or an integer N = allow up to N cycles of that kind (the N+1-th fails — pin
# today's count to forbid adding new ones). `check` prints the current counts.
[rules.cycles]
test-embed = false   # off — parent → mod tests → parent (language feature, not a smell)
mutual     = true    # strict — two nodes that directly depend on each other
chain      = true    # strict — three or more nodes in a dependency cycle

# ── Threshold rules ────────────────────────────────────────────────────────────
# One scope per graph (the scope IS the graph), each limiting a SINGLE unit:
#   [rules.thresholds.file]      — a single file     (files graph only)
#   [rules.thresholds.module]    — a single module   (modules graph only)
#   [rules.thresholds.function]  — a single function (functions graph only)
# Each scope also has an `.avg` sub-table for that scope's graph-wide average,
# e.g. [rules.thresholds.function.avg].
#
# Available metrics: hk, cyclomatic, cognitive, fan_in, fan_out, loc
# A set threshold fails `check` when exceeded; unset = not checked.


# cycles: max allowed count per kind (today's count — raise only to allow more; false = off)
[rules.cycles]
test-embed  = false # off — parent → mod tests → parent (language feature, not a smell)
mutual      = 0     # strict — two nodes that directly depend on each other
chain       = 0     # strict — three or more nodes in a dependency cycle

# thresholds: single = the worst single unit (max); avg = the graph-wide average

[rules.thresholds.module]
cyclomatic  = 1
hk          = 81_920
fan_in      = 16
fan_out     = 18
loc         = 1_696

[rules.thresholds.module.avg]
cyclomatic  = 1
hk          = 15_114
fan_in      = 3
fan_out     = 5
loc         = 351

[rules.thresholds.function]
cyclomatic  = 30
cognitive   = 67
hk          = 81_920
fan_in      = 58
fan_out     = 42
loc         = 1_696

[rules.thresholds.function.avg]
cyclomatic  = 4
cognitive   = 7
hk          = 9_175
fan_in      = 4
fan_out     = 7
loc         = 41